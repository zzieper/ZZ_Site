<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You Found It! — Louie's Secret Page</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { overflow-x: hidden; background: #0a0a1a; }

    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .secret-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem 3rem;
    }

    .paw-trail {
      font-size: 1.4rem;
      letter-spacing: 0.3rem;
      margin-bottom: 1.5rem;
      opacity: 0.55;
    }

    .secret-louie {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--gold);
      box-shadow: 0 0 40px rgba(201,168,76,0.45);
      margin-bottom: 1.5rem;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .secret-louie img { width: 100%; height: 100%; object-fit: cover; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(201,168,76,0.4); }
      50%       { box-shadow: 0 0 55px rgba(201,168,76,0.75); }
    }

    .secret-title {
      font-family: 'Playfair Display', serif;
      color: var(--gold-light);
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .secret-sub {
      color: rgba(255,255,255,0.55);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
      text-align: center;
      max-width: 420px;
    }

    /* ── Gallery Preview ── */
    .gallery-section {
      width: 100%;
      max-width: 860px;
      margin-bottom: 2.5rem;
    }

    .gallery-heading {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 1rem;
      text-align: center;
    }

    .gallery-heading::before { content: '// '; opacity: 0.5; }

    .gallery-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      grid-template-rows: 200px 200px;
      gap: 6px;
      border-radius: 12px;
      overflow: hidden;
    }

    .gallery-cell {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
    }

    .gallery-cell:first-child {
      grid-row: 1 / 3;
    }

    .gallery-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s, filter 0.3s;
      filter: brightness(0.85);
    }

    .gallery-cell:hover img {
      transform: scale(1.06);
      filter: brightness(1);
    }

    /* last cell = "see more" overlay */
    .gallery-more {
      background: rgba(15,30,61,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      text-decoration: none;
      transition: background 0.2s;
    }

    .gallery-more:hover { background: rgba(201,168,76,0.2); }

    .gallery-more .more-icon { font-size: 1.8rem; }

    .gallery-more .more-text {
      color: var(--gold-light);
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
    }

    .gallery-more .more-sub {
      color: rgba(255,255,255,0.45);
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
    }

    /* gold border on hover of whole grid */
    .gallery-grid:hover {
      box-shadow: 0 0 0 1px rgba(201,168,76,0.3);
    }

    /* ── CTA button ── */
    .gallery-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--gold);
      color: var(--navy);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      transition: background 0.2s, transform 0.2s;
      margin-bottom: 2rem;
    }

    .gallery-cta:hover { background: var(--gold-light); transform: translateY(-2px); }

    .back-link {
      color: rgba(255,255,255,0.35);
      font-size: 0.8rem;
      text-decoration: none;
      margin-top: 0.5rem;
    }
    .back-link:hover { color: rgba(255,255,255,0.65); }

    /* confetti */
    .confetti {
      position: fixed;
      top: -10px;
      border-radius: 2px;
      animation: fall linear forwards;
      pointer-events: none;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="secret-wrap">
    <div class="paw-trail">🐾 🐾 🐾</div>

    <div class="secret-louie">
      <img src="images/Louie_Icon.png" alt="Louie" />
    </div>

    <h1 class="secret-title">You Found Louie's Den!</h1>
    <p class="secret-sub">
      You balanced the puzzle on Louie's nose. Well done, puzzler.
      Here's a peek at his personal photo archive.
    </p>

    <!-- Gallery Preview -->
    <div class="gallery-section">
      <p class="gallery-heading">Louie's Photo Album — Preview</p>
      <div class="gallery-grid">

        <!-- Large left cell -->
        <a class="gallery-cell" href="https://photos.app.goo.gl/6jLijjqz9PH1sxCa8" target="_blank" rel="noopener">
          <img src="images/draper/image32.jpeg" alt="Louie" />
        </a>

        <!-- Top middle -->
        <a class="gallery-cell" href="https://photos.app.goo.gl/6jLijjqz9PH1sxCa8" target="_blank" rel="noopener">
          <img src="images/Louie_Icon.png" alt="Louie" style="object-position: center 15%; filter: brightness(0.9);" />
        </a>

        <!-- Top right -->
        <a class="gallery-cell" href="https://photos.app.goo.gl/6jLijjqz9PH1sxCa8" target="_blank" rel="noopener">
          <img src="images/draper/image32.jpeg" alt="Louie" style="object-position: 60% 10%; transform: scale(1.4);" />
        </a>

        <!-- Bottom middle -->
        <a class="gallery-cell" href="https://photos.app.goo.gl/6jLijjqz9PH1sxCa8" target="_blank" rel="noopener">
          <img src="images/draper/image32.jpeg" alt="Louie" style="object-position: 30% 30%; transform: scale(1.6);" />
        </a>

        <!-- Bottom right = "See More" -->
        <a class="gallery-cell gallery-more" href="https://photos.app.goo.gl/6jLijjqz9PH1sxCa8" target="_blank" rel="noopener">
          <span class="more-icon">📷</span>
          <span class="more-text">See Full Album</span>
          <span class="more-sub">Google Photos →</span>
        </a>

      </div>
    </div>

    <a class="gallery-cta" href="https://photos.app.goo.gl/6jLijjqz9PH1sxCa8" target="_blank" rel="noopener">
      📸 Open Louie's Full Photo Album
    </a>

    <a href="index.html" class="back-link">← Back to the main site</a>
  </div>

  <script>
    // Starfield
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = Array.from({ length: 140 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.3,
      a: Math.random(),
      da: (Math.random() - 0.5) * 0.008
    }));

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.a = Math.max(0.1, Math.min(1, s.a + s.da));
        if (s.a <= 0.1 || s.a >= 1) s.da *= -1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Confetti
    const colors = ['#c9a84c', '#e2c97e', '#4a7fc1', '#7aaee0', '#f472b6', '#34d399'];
    function makeConfetti() {
      for (let i = 0; i < 70; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
        el.style.animationDelay = Math.random() * 0.6 + 's';
        el.style.width = (Math.random() * 8 + 5) + 'px';
        el.style.height = (Math.random() * 8 + 5) + 'px';
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }
    setTimeout(makeConfetti, 150);
  </script>
</body>
</html>
