<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Louie's Den — Zachary H. Zieper</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080e22;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Starfield canvas */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* Page wrapper */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5rem 1.5rem 4rem;
    }

    /* ── Header ── */
    .s-hero {
      text-align: center;
      margin-bottom: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .louie-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--gold);
      box-shadow: 0 0 0 6px rgba(201,168,76,0.12);
      margin: 0 auto 1.5rem;
      animation: glow 2.8s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 6px rgba(201,168,76,0.12), 0 0 28px rgba(201,168,76,0.3); }
      50%       { box-shadow: 0 0 0 6px rgba(201,168,76,0.2),  0 0 52px rgba(201,168,76,0.55); }
    }

    .louie-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .s-hero h1 {
      font-family: 'Playfair Display', serif;
      color: var(--gold-light);
      font-size: clamp(1.9rem, 4vw, 2.6rem);
      margin-bottom: 0.5rem;
    }

    .s-hero p {
      color: rgba(255,255,255,0.5);
      font-size: 0.95rem;
      max-width: 380px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* ── Gallery ── */
    .gallery-wrap {
      width: 100%;
      max-width: 820px;
      margin-bottom: 2.5rem;
    }

    .gallery-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      text-align: center;
      margin-bottom: 0.9rem;
      opacity: 0.8;
    }
    .gallery-label::before { content: '// '; opacity: 0.5; }

    .gallery-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      grid-template-rows: 195px 195px;
      gap: 5px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    }

    .gallery-cell {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      display: block;
      text-decoration: none;
    }

    .gallery-cell:first-child { grid-row: 1 / 3; }

    .gallery-cell img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.45s ease, filter 0.3s ease;
      filter: brightness(0.82);
    }

    .gallery-cell:hover img {
      transform: scale(1.07);
      filter: brightness(1);
    }

    /* "See more" tile */
    .tile-more {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
    }

    .tile-more img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(0.28) !important;
      transition: filter 0.3s ease !important;
    }

    .tile-more:hover img { filter: brightness(0.38) !important; }

    .tile-more-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      pointer-events: none;
    }

    .tile-more-icon { font-size: 1.6rem; }

    .tile-more-text {
      color: var(--gold-light);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .tile-more-sub {
      color: rgba(255,255,255,0.4);
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .btn-album {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--gold);
      color: #0f1e3d;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.92rem;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-album:hover { background: var(--gold-light); transform: translateY(-2px); }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.92rem;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
    }
    .btn-home:hover {
      border-color: var(--gold);
      color: var(--gold);
      transform: translateY(-2px);
    }

    /* ── Confetti ── */
    .confetti {
      position: fixed;
      top: -10px;
      border-radius: 2px;
      animation: fall linear forwards;
      pointer-events: none;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .gallery-grid {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 160px 160px 160px;
      }
      .gallery-cell:first-child { grid-row: 1 / 2; grid-column: 1 / 3; }
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="page">

    <!-- Header -->
    <div class="s-hero">
      <div class="louie-avatar">

      <h1>You Found Louie's Den</h1>
      <p>You balanced the puzzle on his nose — well done, puzzler.<br>Here's a peek at his photo archive.</p>
    </div><!-- end .s-hero -->

    <!-- Photo gallery -->
    <div class="gallery-wrap">
      <p class="gallery-label">Louie's Photo Album</p>
      <div class="gallery-grid">

        <a class="gallery-cell" href="https://photos.app.goo.gl/6jLijjqz9PH1sxCa8" target="_blank" rel="noopener">

        </a>

        <a class="gallery-cell" href="https://photos.app.goo.gl/6jLijjqz9PH1sxCa8" target="_blank" rel="noopener">
          <img src="https://lh3.googleusercontent.com/pw/AP1GczOxzff1ikRXL_-YJq4JdxqrWtA-qdYpAiJjOZ7ErmMqN2a3PorWynsOHPAZavfO3ZjVCI3ALcEGAv3YYigNegElKXJLWYRcYelfrxSveUOBr2bWwa4zbHuBTXqcQtgICcdGZYKbr97frqa1GS0IqhoGzg=w664-h828-s-no-gm?authuser=0" alt="Louie" />
        </a>

        <a class="gallery-cell" href="https://photos.app.goo.gl/6jLijjqz9PH1sxCa8" target="_blank" rel="noopener">
          <img src="https://lh3.googleusercontent.com/pw/AP1GczMPCO-TUJzAJwArm3G8N6EuZT_t0d71QcffVlyHQ20q3yiwNXeDK5HvPgovYYlZ2WxFva9mWubV46BJ-8HCFW_q2_q5wvt4WHONTgr8p69YOnr8Rhubu4bq9jMff2Z7eiMApNs-KUOMvArkwVJ8ynixrA=w632-h828-s-no-gm?authuser=0" alt="Louie" />
        </a>

        <a class="gallery-cell" href="https://photos.app.goo.gl/6jLijjqz9PH1sxCa8" target="_blank" rel="noopener">

        <a class="gallery-cell tile-more" href="https://photos.app.goo.gl/6jLijjqz9PH1sxCa8" target="_blank" rel="noopener">
          <img src="https://lh3.googleusercontent.com/pw/AP1GczOg4DLu-muUZd4cpoRsXN2RsQS2pKNFJBqVO6gq5df0BRHy2U9GfaWMBt-XsVSUmZlURFDJa9HeGj_tV9I-C_xOmaAlXKvi_gQ0GUl41WoCuWYBT-jQvpj6sRE6LeKHcb0G6pnrtFkSw5SKt3j0PGeHcg=w623-h828-s-no-gm?authuser=0" alt="Louie" />
          <div class="tile-more-inner">
            <span class="tile-more-icon">📷</span>

      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <a class="btn-album" href="https://photos.app.goo.gl/6jLijjqz9PH1sxCa8" target="_blank" rel="noopener">
        📸 Open Full Album
      </a>
      <a class="btn-home" href="index.html">
        ← Back to Home
      </a>
    </div>

  </div>

  <script>
    // Starfield
    const canvas = document.getElementById('stars');
    const ctx    = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const stars = Array.from({ length: 160 }, () => ({
      x:  Math.random() * canvas.width,
      y:  Math.random() * canvas.height,
      r:  Math.random() * 1.3 + 0.2,
      a:  Math.random(),
      da: (Math.random() - 0.5) * 0.007
    }));

    (function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.a = Math.max(0.08, Math.min(1, s.a + s.da));
        if (s.a <= 0.08 || s.a >= 1) s.da *= -1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.fill();
      });
      requestAnimationFrame(tick);
    })();

    // Confetti burst on load
    const palette = ['#c9a84c','#e2c97e','#4a7fc1','#7aaee0','#f472b6','#34d399'];
    setTimeout(() => {
      for (let i = 0; i < 65; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `
          left:${Math.random()*100}vw;
          background:${palette[Math.floor(Math.random()*palette.length)]};
          width:${Math.random()*7+4}px;
          height:${Math.random()*7+4}px;
          animation-duration:${Math.random()*2+1.4}s;
          animation-delay:${Math.random()*0.5}s;
        `;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }, 100);
  </script>
</body>
</html>
